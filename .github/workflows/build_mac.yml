name: Build Mac .app

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller flask curl_cffi requests

      - name: Build .app
        run: |
          pyinstaller PriceScout_mac.spec --clean

      - name: Package .zip
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          cd dist
          zip -r "../PriceScout_v${VERSION}_mac.zip" PriceScout.app
          echo "ZIP créé : PriceScout_v${VERSION}_mac.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PriceScout-Mac
          path: "*.zip"
          retention-days: 7
